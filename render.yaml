services:
  - type: web
    name: corporate-smart-messenger
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/home.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 # Or 3.13 if supported, but 3.11 is safe
      - key: DB_NAME
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
